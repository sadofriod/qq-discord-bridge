version: '3.8'
services:
  qq-discord-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: qq-discord-bridge:latest
    container_name: qq-discord-bridge
    restart: unless-stopped
    environment:
      - QQ_BOT_TYPE=${QQ_BOT_TYPE:-oicq}
      - QQ_ACCOUNT=${QQ_ACCOUNT}
      - QQ_PASSWORD=${QQ_PASSWORD}
      - QQ_PLATFORM=${QQ_PLATFORM:-1}
      - QQ_DATA_DIR=${QQ_DATA_DIR:-/app/data/qq}
      - QQ_APP_ID=${QQ_APP_ID:-}
      - QQ_APP_TOKEN=${QQ_APP_TOKEN:-}
      - QQ_BOT_SANDBOX=${QQ_BOT_SANDBOX:-false}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - DEFAULT_AVATAR_URL=${DEFAULT_AVATAR_URL:-https://q1.qlogo.cn/g?b=qq&nk=10000&s=100}
      - GROUP_MAPPINGS=${GROUP_MAPPINGS}
      - FILTER_KEYWORDS=${FILTER_KEYWORDS:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_DIR=${LOG_DIR:-/app/logs}
    volumes:
      - ./data/qq:/app/data/qq
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"