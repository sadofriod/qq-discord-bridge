version: '3.8'
services:
  qq-discord-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: qq-discord-bridge:latest
    container_name: qq-discord-bridge
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/qq:/app/data/qq
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"